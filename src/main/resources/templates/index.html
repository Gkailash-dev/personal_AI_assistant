<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>AI Assistant</title>

    <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {

            --bg: #050816;
            --bg2: #0b1023;

            --card: #0f172a;

            --text: #f8fafc;
            --muted: #94a3b8;

            --line: rgba(255, 255, 255, .08);

            --primary: #00d4ff;
            --primary2: #7c3aed;

            --success: #22c55e;
        }

        body {

            font-family: 'DM Sans', sans-serif;

            background:
                    radial-gradient(circle at top right,
                    rgba(0, 212, 255, .12),
                    transparent 25%),

                    radial-gradient(circle at bottom left,
                    rgba(124, 58, 237, .12),
                    transparent 25%),

                    var(--bg);

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: flex-start;

            padding: 50px 20px;

            overflow-x: hidden;

            color: var(--text);

            position: relative;
        }

        body::before {

            content: '';

            position: fixed;

            inset: 0;

            background-image:
                    radial-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px);

            background-size: 4px 4px;

            pointer-events: none;
        }

        .card {

            position: relative;

            z-index: 1;

            width: 100%;
            max-width: 760px;

            background: rgba(15, 23, 42, .78);

            backdrop-filter: blur(25px);

            border: 1px solid #fff;

            border-radius: 28px;

            padding: 50px;

            box-shadow:
                    0 10px 50px rgba(0, 0, 0, .55),
                    0 0 40px rgba(0, 212, 255, .06);

            overflow: hidden;
        }

        .header {

            text-align: center;

            margin-bottom: 30px;
        }

        .header-eyebrow {

            display: inline-flex;

            align-items: center;

            gap: 8px;

            padding: 8px 18px;

            border-radius: 50px;

            background: rgba(0, 212, 255, .08);

            color: #7dd3fc;

            font-size: 11px;

            letter-spacing: .15em;

            text-transform: uppercase;

            margin-bottom: 18px;

            border: 1px solid rgba(0, 212, 255, .18);
        }

        h1 {

            font-family: 'DM Serif Display', serif;

            font-size: 4rem;

            color: white;

            letter-spacing: -.04em;

            text-shadow:
                    0 0 25px rgba(0, 212, 255, .25);
        }

        .header-desc {

            margin-top: 14px;

            color: #b6c2d1;

            font-size: 15px;

            line-height: 1.9;

            max-width: 540px;

            margin-inline: auto;
        }

        .divider {

            display: flex;

            align-items: center;

            gap: 18px;

            margin: 40px 0 25px;
        }

        .divider::before,
        .divider::after {

            content: '';

            flex: 1;

            height: 1px;

            background: rgba(255, 255, 255, .08);
        }

        .divider-label {

            font-size: 11px;

            font-weight: 700;

            letter-spacing: .18em;

            color: #94a3b8;

            text-transform: uppercase;
        }

        .section-label {

            font-size: 11px;

            font-weight: 700;

            letter-spacing: .14em;

            color: #94a3b8;

            text-transform: uppercase;

            margin-bottom: 12px;
        }

        .chat-bar {

            display: flex;

            align-items: center;

            border: 1px solid #fff;

            border-radius: 18px;

            overflow: hidden;

            background: rgba(17, 24, 39, .85);

            backdrop-filter: blur(12px);

            transition: .35s ease;
        }

        .chat-bar:hover {

            transform: translateY(-2px);

            box-shadow:
                    0 0 25px rgba(0, 212, 255, .08);
        }

        .chat-attach {

            width: 62px;
            height: 62px;

            display: flex;

            align-items: center;

            justify-content: center;

            border-right: 1px solid #fff;

            position: relative;

            cursor: pointer;

            color: #94a3b8;

            transition: .3s ease;
        }

        .chat-attach:hover {

            background: rgba(255, 255, 255, .03);
        }

        .chat-attach input {

            position: absolute;

            inset: 0;

            opacity: 0;

            cursor: pointer;
        }

        .chat-input {

            flex: 1;

            height: 62px;

            border: none;

            outline: none;

            background: none;

            padding: 0 18px;

            font-size: 15px;

            color: white;
        }

        .chat-input::placeholder {

            color: #6b7280;
        }

        .chat-send {

            width: 62px;
            height: 62px;

            border: none;

            background:
                    linear-gradient(135deg,
                    var(--primary),
                    var(--primary2));

            color: white;

            display: flex;

            align-items: center;

            justify-content: center;

            cursor: pointer;

            transition: .35s ease;
        }

        .chat-send:hover {

            transform: scale(1.06);

            box-shadow:
                    0 0 30px rgba(0, 212, 255, .35);
        }

        .response-box {

            min-height: 220px;

            border-radius: 22px;

            background:
                    linear-gradient(145deg,
                    rgba(17, 24, 39, .95),
                    rgba(2, 6, 23, .95));

            border: 1px solid rgba(255, 255, 255, .06);

            padding: 28px;

            color: #f3f4f6;

            line-height: 1.9;

            font-size: 15px;

            position: relative;

            overflow: hidden;

            backdrop-filter: blur(18px);

            transition: .4s ease;

            box-shadow:
                    0 12px 40px rgba(0, 0, 0, .45);
        }

        .response-box::before {

            content: '';

            position: absolute;

            inset: -2px;

            border-radius: 24px;

            background:
                    linear-gradient(130deg,
                    #00d4ff,
                    #7c3aed,
                    #00d4ff);

            z-index: -1;

            opacity: .3;

            filter: blur(20px);

            animation: borderGlow 8s linear infinite;
        }

        @keyframes borderGlow {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .response-empty {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            color: #64748b;

            font-style: italic;
        }

        .ai-answer {

            display: block;

            white-space: pre-wrap;

            animation: fadeUp .6s ease;
        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-thinking {

            height: 140px;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            gap: 20px;
        }

        .ai-ring {

            width: 58px;
            height: 58px;

            border-radius: 50%;

            border: 3px solid rgba(255, 255, 255, .08);

            border-top: 3px solid #00d4ff;

            animation: spin 1s linear infinite;

            box-shadow:
                    0 0 25px rgba(0, 212, 255, .25);
        }

        @keyframes spin {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .ai-thinking-text {

            color: #94a3b8;

            font-size: 13px;

            letter-spacing: .08em;

            text-transform: uppercase;
        }

        .vault-bar {

            display: flex;

            align-items: center;

            border: 1px solid #fff;

            border-radius: 18px;

            overflow: hidden;

            background: rgba(17, 24, 39, .85);

            backdrop-filter: blur(12px);
        }

        .vault-icon {

            width: 58px;
            height: 58px;

            display: flex;

            align-items: center;

            justify-content: center;

            color: #94a3b8;
        }

        .vault-input {

            flex: 1;

            height: 58px;

            border: none;

            outline: none;

            background: none;

            color: white;

            padding: 0 10px;

            font-size: 14px;
        }

        .vault-input::placeholder {

            color: #6b7280;
        }

        .vault-save {

            width: 58px;
            height: 58px;

            border: none;

            background: none;

            border-left: 1px solid #fff;

            color: white;

            cursor: pointer;

            transition: .3s ease;
        }

        .vault-save:hover {

            background: rgba(0, 212, 255, .08);
        }

        .notes-list {

            margin-top: 14px;

            display: flex;

            flex-direction: column;

            gap: 12px;
        }

        .note-chip {

            display: flex;

            gap: 12px;

            align-items: flex-start;

            padding: 16px;

            border-radius: 16px;

            border: 1px solid #fff;

            background: rgba(17, 24, 39, .8);

            color: #e5e7eb;

            backdrop-filter: blur(10px);

            transition: .3s ease;
        }

        .note-chip:hover {

            transform: translateY(-3px);

            box-shadow:
                    0 10px 25px rgba(0, 0, 0, .35);
        }

        .note-dot {

            width: 8px;
            height: 8px;

            border-radius: 50%;

            background: #00d4ff;

            margin-top: 7px;
        }

        @media(max-width:650px) {

            .card {
                padding: 28px 20px;
            }

            h1 {
                font-size: 2.6rem;
            }

            .chat-input {
                font-size: 14px;
            }
        }
    </style>

</head>

<body>

<div class="card">

    <div class="header">



        <h1>AI Assistant</h1>

        <p class="header-desc">

            Analyze PDFs, generate smart summaries,
            save memory notes, and chat with your AI assistant
            using a futuristic interface.

        </p>

    </div>

    <div class="divider">

            <span class="divider-label">
                AI Chat
            </span>

    </div>

    <form action="/ask" method="post" enctype="multipart/form-data" id="askForm">

        <div class="chat-bar">

            <label class="chat-attach">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.2">

                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />

                </svg>

                <input type="file" name="file" accept=".pdf" onchange="showFileName(this)">

            </label>

            <input class="chat-input" type="text" name="question" placeholder="Ask anything..." required>

            <button class="chat-send" type="submit">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.4">

                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />

                </svg>

            </button>

        </div>

        <div id="fileHint" style="font-size:12px;color:#94a3b8;margin-top:10px;display:none;">
        </div>

    </form>

    <div style="margin-top:30px;">

        <div class="section-label">
            AI Response
        </div>

        <div class="response-box" id="responseBox">

                <span class="response-empty" th:if="${answer == null or answer == ''}">

                    Awaiting your question...

                </span>

            <span class="ai-answer" th:text="${answer}" th:if="${answer != null and answer != ''}">
                </span>

        </div>

    </div>

    <div class="divider" style="margin-top:42px;">

            <span class="divider-label">

                Memory Vault

            </span>

    </div>

    <form action="/add-note" method="post" id="noteForm">

        <div class="vault-bar">

            <div class="vault-icon">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    <path d="M4.93 4.93a10 10 0 0 0 0 14.14" />

                </svg>

            </div>

            <input class="vault-input" type="text" name="note" id="noteInput" placeholder="Write your note here..."
                   required>

            <button class="vault-save" type="submit">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.2">

                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />

                </svg>

            </button>

        </div>

    </form>

    <div class="notes-list" id="notesList"></div>

</div>

<script>

    function showFileName(input) {

        const hint =
            document.getElementById('fileHint');

        if (input.files.length) {

            hint.innerHTML =
                "📎 " + input.files[0].name;

            hint.style.display = "block";

        } else {

            hint.style.display = "none";
        }
    }

    document.getElementById('askForm')
        .addEventListener('submit', function () {

            const box =
                document.getElementById('responseBox');

            box.innerHTML = `

                <div class="ai-thinking">

                    <div class="ai-ring"></div>

                    <div class="ai-thinking-text">

                        AI is analyzing your request...

                    </div>

                </div>

            `;
        });

    document.getElementById('noteForm')
        .addEventListener('submit', function ()  {

            const input =
                document.getElementById('noteInput');

            const text = input.value.trim();

            if (!text) return;

            const list =
                document.getElementById('notesList');

            const chip =
                document.createElement('div');

            chip.className = 'note-chip';

            chip.innerHTML = `

                <span class="note-dot"></span>

                <span>${text}</span>

            `;

            list.prepend(chip);


        });

</script>

</body>

</html>
